# 将 docs/DARE_FRAMEWORK_DESIGN.md 转为 PDF（含 Mermaid 图渲染）并上传为 Artifact
name: Build design doc PDF

on:
  push:
    branches: [main, master, detailed_doc]
    paths:
      - 'docs/DARE_FRAMEWORK_DESIGN.md'
  workflow_dispatch:

jobs:
  md-to-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js 20 (for mermaid-cli, no lockfile needed)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install Chromium dependencies (for mermaid-cli)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
            libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgbm1 libgcc1 libglib2.0-0 libgtk-3-0 libnspr4 \
            libnss3 libpango-1.0-0 libpangocairo-1.0-0 libstdc++6 libx11-6 \
            libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            lsb-release wget xdg-utils

      - name: Install mermaid-cli (mmdc)
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Setup Python and pandoc-mermaid filter
        run: |
          sudo apt-get install -y python3 python3-venv python3-pip
          python3 -m venv .venv
          .venv/bin/pip install pandoc-mermaid-filter
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          echo "PATH=$GITHUB_WORKSPACE/.venv/bin:$PATH" >> $GITHUB_ENV

      - name: Install Pandoc and LaTeX (XeLaTeX + CJK)
        run: |
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            fonts-noto-cjk

      - name: Build PDF (with Mermaid rendered as images)
        run: |
          pandoc docs/DARE_FRAMEWORK_DESIGN.md \
            -o DARE_FRAMEWORK_DESIGN.pdf \
            --pdf-engine=xelatex \
            -V CJKmainfont="Noto Serif CJK SC" \
            -V geometry:margin=2.5cm \
            -V colorlinks=true \
            --toc \
            --toc-depth=3 \
            --filter pandoc-mermaid
        env:
          LC_ALL: en_US.UTF-8

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: DARE_FRAMEWORK_DESIGN-pdf
          path: DARE_FRAMEWORK_DESIGN.pdf
